<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Portal · Students</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body data-page="students">
  <header class="top-nav" data-nav></header>
  <main class="container stack">
    <section class="card stack">
      <h1>Students</h1>
      <p>Unsaved changes: <strong id="changeCount">0</strong></p>
      <div class="rowline">
        <input id="studentSearch" placeholder="Search by name/email" />
        <input id="newName" placeholder="New student name" />
        <input id="newEmail" placeholder="New student email" type="email" />
        <button id="addStudent">Add Student</button>
      </div>
    </section>
    <section id="studentsGrid" class="grid cols-3"></section>
  </main>
  <script type="module" src="assets/app.js"></script>
</body>
</html>
