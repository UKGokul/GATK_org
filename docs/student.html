<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admissions Tracker · Student Detail</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body data-page="student">
  <header class="top-nav" data-nav></header>
  <main class="container stack" id="studentRoot">
    <section>
      <h1>Student Detail <span class="small" id="studentId"></span></h1>
      <p class="small">Edit profile, manage applications, and track documents.</p>
    </section>

    <section class="card stack">
      <h2>Profile</h2>
      <div class="row">
        <div class="col-6"><label>Name</label><input id="name" /></div>
        <div class="col-6"><label>Email</label><input id="email" type="email" /></div>
        <div class="col-4"><label>Cohort</label><input id="cohort" /></div>
        <div class="col-12"><label>Notes</label><textarea id="notes"></textarea></div>
      </div>
      <div class="inline-actions"><button id="saveStudent">Save student</button></div>
    </section>

    <section class="card stack">
      <h2>Applications</h2>
      <div class="row">
        <div class="col-4"><label>University</label><input id="appUniversity" /></div>
        <div class="col-4"><label>Program</label><input id="appProgram" /></div>
        <div class="col-2"><label>Status</label><select id="appStatus"><option>Draft</option><option>In Progress</option><option>Submitted</option><option>Rejected</option></select></div>
        <div class="col-2"><label>Deadline</label><input id="appDeadline" type="date" /></div>
      </div>
      <div class="inline-actions"><button id="addApplication">Add application</button></div>

      <div class="table-wrap">
        <table class="table">
          <thead>
            <tr><th>ID</th><th>University</th><th>Program</th><th>Status</th><th>Deadline</th><th>Action</th></tr>
          </thead>
          <tbody id="studentAppRows"></tbody>
        </table>
      </div>
    </section>

    <section class="card stack">
      <h2>Documents Checklist</h2>
      <div id="documents" class="stack"></div>
      <div class="inline-actions"><button id="saveDocuments">Save documents</button></div>
    </section>
  </main>
  <script type="module" src="assets/app.js"></script>
</body>
</html>
