<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Portal · Student Detail</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body data-page="student">
  <header class="top-nav" data-nav></header>
  <main class="container stack" id="studentRoot">
    <section class="card"><h1 id="studentTitle">Student</h1><p>Unsaved changes: <strong id="changeCount">0</strong></p></section>

    <section class="card stack">
      <h2>Profile</h2>
      <div class="grid cols-2">
        <input data-student="name" placeholder="Name" />
        <input data-student="email" placeholder="Email" type="email" />
        <input data-student="phone" placeholder="Phone" />
        <input data-student="emergencyContact.name" placeholder="Emergency contact name" />
        <input data-student="emergencyContact.phone" placeholder="Emergency contact phone" />
        <input data-student="emergencyContact.relation" placeholder="Relation" />
      </div>
      <textarea data-student="notes" placeholder="Notes"></textarea>
      <button id="saveProfile">Save profile</button>
    </section>

    <section class="card stack">
      <h2>Documents</h2>
      <div id="docsList" class="stack"></div>
      <button id="saveDocs">Save document updates</button>
    </section>

    <section class="card stack">
      <h2>Add Application</h2>
      <div class="grid cols-3">
        <input id="uniName" placeholder="University" />
        <input id="programName" placeholder="Program" />
        <select id="portalName"></select>
        <input id="portalUrl" placeholder="Portal URL" />
        <input id="emailUsed" placeholder="Email used" type="email" />
        <input id="applicationAccountId" placeholder="Application account id" />
        <input id="uniAssistId" placeholder="Uni assist id" />
        <input id="deadline" type="date" />
        <input id="submissionDate" type="date" />
        <select id="appStatus"></select>
        <select id="priority"><option>High</option><option>Medium</option><option>Low</option></select>
        <input id="country" placeholder="Country" />
        <input id="city" placeholder="City" />
        <input id="feeEUR" placeholder="Fee EUR" />
      </div>
      <textarea id="requirementsNotes" placeholder="Requirements notes"></textarea>
      <button id="saveApp">Add application</button>
    </section>

    <section class="card stack">
      <h2>Applications</h2>
      <table class="table"><thead><tr><th>ID</th><th>University</th><th>Program</th><th>Status</th><th>Deadline</th><th>Action</th></tr></thead><tbody id="appsTable"></tbody></table>
    </section>
  </main>
  <script type="module" src="assets/app.js"></script>
</body>
</html>
